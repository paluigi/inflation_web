version: '3.8'

services:
  inflation-web:
    image: paluigi/inflation-web:latest
    container_name: inflation-web
    ports:
      - "8000:8000"
    volumes:
      # Mount the assets directory to persist data across container restarts
      # This ensures hicp_data.parquet, last_update.txt, and map CSVs are saved
      - ./src/assets:/app/src/assets
    restart: unless-stopped
    environment:
      - FLET_SERVER_PORT=8000
      - FLET_SERVER_ADDRESS=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s