<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HICP Dashboard — Euro Area Inflation</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

    <nav>
        <div class="nav-brand">Eurostat Dashboard</div>
        <div class="nav-links">
            <a href="index.html" data-page="hicp">HICP</a>
            <a href="weights.html" data-page="weights">HICP Weights</a>
            <a href="ppi.html" data-page="ppi">PPI</a>
            <button class="theme-toggle" id="theme-toggle">Change theme</button>
        </div>
    </nav>

    <div class="container">
        <aside>
            <div class="last-update" id="last-update">Last Update: Loading...</div>

            <div class="tabs">
                <button class="tab active" data-target="tab1">Multi-Country</button>
                <button class="tab" data-target="tab2">Multi-COICOP</button>
            </div>

            <div id="tab1" class="tab-content active">
                <div class="control-group">
                    <label>Select COICOP:</label>
                    <select id="t1-coicop" placeholder="Search code or name..."></select>
                </div>
                <div class="control-group">
                    <label>Select Geographies (Multiple):</label>
                    <select id="t1-geo" multiple placeholder="Search code or name..."></select>
                </div>
            </div>

            <div id="tab2" class="tab-content">
                <div class="control-group">
                    <label>Select Geography:</label>
                    <select id="t2-geo" placeholder="Search code or name..."></select>
                </div>
                <div class="control-group">
                    <label>Select COICOPs (Multiple):</label>
                    <select id="t2-coicop" multiple placeholder="Search code or name..."></select>
                </div>
            </div>

            <div class="control-group" style="margin-top: 10px;">
                <label>Unit of Measure:</label>
                <select id="shared-unit" placeholder="Select Unit..."></select>
            </div>

            <div class="control-group">
                <label>Time Period (yyyy or yyyy-mm):</label>
                <div class="date-inputs">
                    <input type="text" id="date-from" placeholder="From (e.g. 2020)">
                    <input type="text" id="date-to" placeholder="To (e.g. 2024-12)">
                </div>
            </div>

            <button id="btn-query" class="action-btn" disabled>Launch Query</button>
            <button id="btn-export" class="action-btn" disabled>Export to Excel</button>
            <div id="status" style="font-size: 0.85rem; color: var(--text-muted); text-align: center;">Initializing...</div>
        </aside>

        <main>
            <div class="card chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <div class="card">
                <h3>Data Output</h3>
                <div style="overflow-x: auto; max-height: 400px; overflow-y: auto;">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th>Time Period</th>
                                <th>Values...</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="2" style="text-align:center; padding: 20px; color: var(--text-muted);">
                                    No data loaded yet. Select your filters and click "Launch Query".
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
