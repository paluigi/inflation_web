name: Manual Build and Push Docker Image

on:
  workflow_dispatch:
    # This creates the input field in the GitHub interface
    inputs:
      version_tag:
        description: 'Docker image version tag (e.g., v1.0.0, beta)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and push the image to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This applies the tag you typed in, AND always updates the "latest" tag as a best practice
          tags: |
            paluigi/inflation-web:${{ inputs.version_tag }}
            paluigi/inflation-web:latest